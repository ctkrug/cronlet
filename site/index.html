<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cronlet · cron, in plain English</title>
    <meta
      name="description"
      content="Paste a cron expression and read it in plain English, with the next run times and a field schematic. Dependency-free."
    />
    <!-- Blueprint favicon: amber tick between two cyan blocks on indigo -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230c1a2b'/%3E%3Crect x='6' y='13' width='7' height='6' rx='1.5' fill='%234ec9e0'/%3E%3Crect x='19' y='13' width='7' height='6' rx='1.5' fill='%234ec9e0'/%3E%3Ccircle cx='16' cy='16' r='2' fill='%23f4b860'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="grid-bg" aria-hidden="true"></div>

    <header class="topbar">
      <a class="wordmark" href="./" aria-label="Cronlet home">
        cron<span class="tick">·</span>let
      </a>
      <span class="tagline">cron, in plain English</span>
    </header>

    <main>
      <div class="stage">
        <section class="translator" aria-labelledby="input-label">
          <label id="input-label" class="field-label" for="cron-input">
            cron expression
          </label>
          <div class="input-row">
            <input
              id="cron-input"
              class="cron-input"
              type="text"
              spellcheck="false"
              autocapitalize="off"
              autocomplete="off"
              value="*/15 9-17 * * 1-5"
              aria-describedby="cron-error"
            />
            <button id="copy-btn" class="copy-btn" type="button" aria-label="Copy expression">
              <span class="copy-label">copy</span>
            </button>
          </div>
          <p id="cron-error" class="cron-error" role="alert" hidden></p>

          <div class="schematic" id="schematic">
            <!-- field columns injected by app.js -->
          </div>

          <p class="sentence" id="sentence" aria-live="polite">…</p>
        </section>

        <aside class="runlog" aria-labelledby="runlog-label">
          <h2 id="runlog-label" class="field-label">next runs</h2>
          <ol class="runlog-list" id="runlog"></ol>
        </aside>
      </div>

      <section class="builder" aria-labelledby="builder-label">
        <h2 id="builder-label" class="field-label">build a schedule</h2>
        <div class="builder-grid" id="builder">
          <label class="ctl">
            <span class="ctl-name">frequency</span>
            <select id="b-freq" class="select">
              <option value="everyMinute">Every minute</option>
              <option value="everyNMin">Every N minutes</option>
              <option value="hourly">Hourly</option>
              <option value="daily" selected>Daily</option>
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
            </select>
          </label>

          <label class="ctl" id="ctl-step" hidden>
            <span class="ctl-name">interval</span>
            <select id="b-step" class="select">
              <option value="2">every 2 min</option>
              <option value="5">every 5 min</option>
              <option value="10">every 10 min</option>
              <option value="15" selected>every 15 min</option>
              <option value="20">every 20 min</option>
              <option value="30">every 30 min</option>
            </select>
          </label>

          <label class="ctl" id="ctl-dow" hidden>
            <span class="ctl-name">weekday</span>
            <select id="b-dow" class="select">
              <option value="1" selected>Monday</option>
              <option value="2">Tuesday</option>
              <option value="3">Wednesday</option>
              <option value="4">Thursday</option>
              <option value="5">Friday</option>
              <option value="6">Saturday</option>
              <option value="0">Sunday</option>
            </select>
          </label>

          <label class="ctl" id="ctl-dom" hidden>
            <span class="ctl-name">day of month</span>
            <select id="b-dom" class="select"><!-- 1..31 injected --></select>
          </label>

          <label class="ctl" id="ctl-hour" hidden>
            <span class="ctl-name">hour</span>
            <select id="b-hour" class="select"><!-- 0..23 injected --></select>
          </label>

          <label class="ctl" id="ctl-min">
            <span class="ctl-name" id="min-name">minute</span>
            <select id="b-min" class="select"><!-- 0..59 injected --></select>
          </label>
        </div>
        <p class="builder-out">
          builds <code id="builder-preview" class="mono-inline">30 9 * * *</code>
        </p>
      </section>
    </main>

    <footer class="footer">
      <span>Zero dependencies.</span>
      <a href="https://github.com/ctkrug/cronlet">Source on GitHub →</a>
    </footer>

    <script type="module" src="./app.js"></script>
  </body>
</html>
